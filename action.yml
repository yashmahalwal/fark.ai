name: "fark-ai"
description: "Analyzes backend API changes and identifies breaking impacts on frontend codebases"
inputs:
  # Required: GitHub and OpenAI tokens
  backend_github_token:
    description: "GitHub token for backend repository access (GitHub MCP operations)"
    required: true
  openai_api_key:
    description: "OpenAI API key for all AI agents"
    required: true
  github_mcp_server_url:
    description: "GitHub MCP Server URL"
    required: false
    default: "https://api.githubcopilot.com/mcp/"

  # Backend configuration
  backend_owner:
    description: "Backend repository owner"
    required: true
  backend_repo:
    description: "Backend repository name"
    required: true
  backend_pr_number:
    description: "Pull request number to analyze (defaults to context PR number if available)"
    required: false
  backend_codebase_path:
    description: "Path to the backend checkout on the runner (absolute, or relative to GITHUB_WORKSPACE)."
    required: false

  # Frontend configuration (JSON array format - YAML arrays in workflow are JSON-compatible)
  frontends:
    description: |
      Frontend repositories configuration as JSON array (YAML arrays in workflow files are automatically JSON-compatible).
      Example in workflow YAML:
      frontends: |
        [
          {
            "repository": {
              "owner": "your-org",
              "repo": "fark-frontend-demo",
              "branch": "main"
            },
            "codebasePath": "/path/to/frontend-demo"
          },
          {
            "repository": {
              "owner": "your-org",
              "repo": "fark-mobile-demo",
              "branch": "main"
            },
            "codebasePath": "/path/to/mobile-demo"
          }
        ]
    required: true

  # Logging
  log_level:
    description: "Log level (fatal, error, warn, info, debug, trace)"
    required: false
    default: "info"

  # Optional: Agent token limits (for larger PRs)
  # BE Analyzer limits
  be_analyzer_max_steps:
    description: "Maximum steps for BE Analyzer (default: 15)"
    required: false
  be_analyzer_max_output_tokens:
    description: "Maximum output tokens for BE Analyzer (default: 16384)"
    required: false
  be_analyzer_max_total_tokens:
    description: "Maximum total tokens for BE Analyzer (default: 100000)"
    required: false

  # Frontend Finder limits
  frontend_finder_max_steps:
    description: "Maximum steps for Frontend Finder (default: 22)"
    required: false
  frontend_finder_max_output_tokens:
    description: "Maximum output tokens for Frontend Finder (default: 16384)"
    required: false
  frontend_finder_max_total_tokens:
    description: "Maximum total tokens for Frontend Finder (default: 150000)"
    required: false
  frontend_finder_concurrency_limit:
    description: "Maximum concurrent frontend finder tasks (default: 5)"
    required: false

  # Comment Generator limits
  comment_generator_max_steps:
    description: "Maximum steps for Comment Generator (default: 12)"
    required: false
  comment_generator_max_output_tokens:
    description: "Maximum output tokens for Comment Generator (default: 8192)"
    required: false
  comment_generator_max_total_tokens:
    description: "Maximum total tokens for Comment Generator (default: 48000)"
    required: false

  # PR Comment Poster limits
  pr_comment_poster_max_steps:
    description: "Maximum steps for PR Comment Poster (default: 45)"
    required: false
  pr_comment_poster_max_output_tokens:
    description: "Maximum output tokens for PR Comment Poster (default: 8192)"
    required: false
  pr_comment_poster_max_total_tokens:
    description: "Maximum total tokens for PR Comment Poster (default: 150000)"
    required: false

outputs:
  changes_count:
    description: "Number of backend changes detected"
    value: ${{ steps.run.outputs.changes_count }}
  impacts_count:
    description: "Total number of frontend impacts found"
    value: ${{ steps.run.outputs.impacts_count }}
  comments_count:
    description: "Number of PR comments posted"
    value: ${{ steps.run.outputs.comments_count }}

runs:
  using: composite
  steps:
    - name: Cache node_modules
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ github.action_path }}/node_modules
        key: ${{ runner.os }}-fark-ai-${{ hashFiles(format('{0}/package-lock.json', github.action_path)) }}

    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci --prefix ${{ github.action_path }}

    - name: Run
      id: run
      shell: bash
      run: node ${{ github.action_path }}/dist/index.js

branding:
  icon: "zap"
  color: "blue"
